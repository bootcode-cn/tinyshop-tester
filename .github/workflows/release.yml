name: Release

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: bootcode-cn/tinyshop-tester

jobs:
  unit-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build tester
        run: go build -v .

      - name: Run unit tests
        run: go test -v ./...

      - name: Verify binary
        run: ./tinyshop-tester --help

  regression-test:
    needs: unit-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build test image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          tags: ghcr.io/bootcode-cn/tinyshop-tester:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Checkout solution
        uses: actions/checkout@v4
        with:
          repository: bootcode-cn/tinyshop-solution
          token: ${{ secrets.SOLUTION_REPO_PAT }}
          path: solution

      - name: Run regression tests
        run: |
          STAGES=(
            hello-shop
            first-product
            set-price
            first-sale
            discount-or-not
          )

          FAILED=()
          TOTAL=0
          for stage in "${STAGES[@]}"; do
            TOTAL=$((TOTAL + 1))
            find "$(pwd)/solution" -type d -name __pycache__ -exec rm -rf {} + 2>/dev/null || true
            echo "Testing ${stage}..."
            if docker run --rm --user $(id -u):$(id -g) \
              -v "$(pwd)/solution:/workspace" \
              ghcr.io/bootcode-cn/tinyshop-tester:test \
              -s "$stage" -d /workspace; then
              echo "✓ ${stage} passed"
            else
              echo "✗ ${stage} failed"
              FAILED+=("${stage}")
            fi
          done

          if [ ${#FAILED[@]} -gt 0 ]; then
            echo ""
            echo "Failed: ${FAILED[*]}"
            exit 1
          fi

          echo ""
          echo "All ${TOTAL} tests passed!"

  release-binary:
    needs: regression-test
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build binaries
        run: |
          CGO_ENABLED=0 GOOS=linux  GOARCH=amd64 go build -ldflags="-s -w" -o tinyshop-tester-linux-amd64  .
          CGO_ENABLED=0 GOOS=linux  GOARCH=arm64 go build -ldflags="-s -w" -o tinyshop-tester-linux-arm64  .
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w" -o tinyshop-tester-darwin-amd64 .
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o tinyshop-tester-darwin-arm64 .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: tinyshop-tester-*
          generate_release_notes: true

      - name: Install ossutil
        run: |
          curl -sSL https://gosspublic.alicdn.com/ossutil/1.7.18/ossutil-v1.7.18-linux-amd64.zip -o ossutil.zip
          unzip -q ossutil.zip
          mv ossutil-v1.7.18-linux-amd64/ossutil /usr/local/bin/ossutil
          chmod +x /usr/local/bin/ossutil

      - name: Upload tester to Alibaba Cloud OSS
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_SECRET: ${{ secrets.OSS_ACCESS_SECRET }}
        run: |
          ossutil cp -f tinyshop-tester-linux-amd64 \
            oss://bootcode-eval/testers/tinyshop-tester-linux-amd64 \
            --endpoint https://oss-cn-shanghai.aliyuncs.com \
            --access-key-id "$OSS_ACCESS_KEY_ID" \
            --access-key-secret "$OSS_ACCESS_SECRET"

  release-image:
    needs: regression-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push multi-platform image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
